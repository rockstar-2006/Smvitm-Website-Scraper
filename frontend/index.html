<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#85122c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SMVITM Chat">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SMVITM Chatbot | Shri Madhwa Vadiraja Institute of Technology & Management</title>
    <meta name="description" content="AI-powered virtual assistant for SMVITM Bantakal. Ask about admissions, departments, placements, campus life and more. Available on mobile, tablet, and desktop.">
    <meta name="keywords" content="SMVITM chatbot, AI assistant, college admissions, campus information">
    <meta name="author" content="SMVITM">
    <link rel="stylesheet" href="/static/style.css?v=63">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/marked.min.js"></script>
    <link rel="icon" href="https://sode-edu.in/smvitm/wp-content/uploads/2021/05/logo_smvitm.png" type="image/png">
    <link rel="apple-touch-icon" href="https://sode-edu.in/smvitm/wp-content/uploads/2021/05/logo_smvitm.png">
</head>
<body>
    <!-- Voice Overlay (Hidden by default) -->
    <div id="voice-overlay" class="hidden">
        <button id="close-voice-btn" title="Exit Voice Mode">✖</button>
        <div class="voice-content">
            <h2 id="voice-status">Voice Mode</h2>
            <div class="orb-container">
                <div id="voice-orb" class="idle"></div>
            </div>
            <p id="voice-subtext">Click the orb to start speaking.</p>
        </div>
    </div>

    <div class="app-wrapper minimized" id="app-wrapper">
        <!-- Background decoration -->
        <div class="bg-decoration">
            <div class="bg-circle bg-circle-1"></div>
            <div class="bg-circle bg-circle-2"></div>
            <div class="bg-circle bg-circle-3"></div>
        </div>

        <div class="glass-container" id="chat-app">
            <header id="chat-header">
                <div class="logo-section">
                    <div class="logo-wrapper">
                        <img src="https://sode-edu.in/smvitm/wp-content/uploads/2021/05/logo_smvitm.png" alt="SMVITM Logo" class="logo">
                    </div>
                    <div class="title-group">
                        <h1>SMVITM Assistant</h1>
                        <p class="status"><span class="pulse"></span> Online &bull; AI-Powered</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="clear-chat-btn" title="Clear chat history" class="header-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                    <button id="minimize-btn" title="Close window" class="header-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div id="chat-container">
                <div class="welcome-section fade-in">
                    <div class="welcome-icon">🎓</div>
                    <h2 class="welcome-title">Welcome to SMVITM</h2>
                    <p class="welcome-desc">I'm your AI assistant for all things SMVITM. Ask me anything about admissions, departments, placements, or campus life!</p>
                </div>
                <div class="suggestion-chips" id="suggestion-chips">
                    <button class="chip" data-query="What courses does SMVITM offer?">📚 Courses Offered</button>
                    <button class="chip" data-query="How to get admission in SMVITM?">🎯 Admissions</button>
                    <button class="chip" data-query="Tell me about placements at SMVITM">💼 Placements</button>
                    <button class="chip" data-query="What PG programs are available?">🎓 PG Programs</button>
                    <button class="chip" data-query="Tell me about the MBA department">📊 MBA</button>
                    <button class="chip" data-query="What are the hostel facilities?">🏠 Hostel</button>
                </div>
            </div>

            <div class="input-area" id="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask about admissions, branches, placements..." autocomplete="off">
                    <!-- Mic button hidden for now
                    <button id="mic-btn" title="Voice input" class="input-action-btn mic-idle">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    -->
                </div>
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>

            <footer class="chat-footer">
                <span>Powered by AI &bull; <a href="https://sode-edu.in/smvitm" target="_blank">sode-edu.in/smvitm</a></span>
            </footer>
        </div>

        <!-- Floating Toggle Button -->
        <button id="chat-toggle-btn" class="chat-toggle-btn" title="Toggle Chat">
            <div class="toggle-content open-content">
                <span class="btn-icon">🎓</span>
                <span class="btn-text">Ask SMVITM</span>
            </div>
            <div class="toggle-content close-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </button>
    </div>


    <script src="/static/script.js?v=30"></script>
    <script>
        // Highly reliable inline clear function bypassing potential cache gaps
        window.resetSMVITMChat = function() {
            const cc = document.getElementById('chat-container');
            if (cc) {
                if (typeof chatStarted !== 'undefined') { chatStarted = false; }
                
                cc.innerHTML = `
                    <div class="welcome-section fade-in">
                        <div class="welcome-icon">🎓</div>
                        <h2 class="welcome-title">Welcome to SMVITM</h2>
                        <p class="welcome-desc">I'm your AI assistant for all things SMVITM. Ask me anything about admissions, departments, placements, or campus life!</p>
                    </div>
                    <div class="suggestion-chips" id="suggestion-chips">
                        <button class="chip" data-query="What courses does SMVITM offer?">📚 Courses Offered</button>
                        <button class="chip" data-query="How to get admission in SMVITM?">🎯 Admissions</button>
                        <button class="chip" data-query="Tell me about placements at SMVITM">💼 Placements</button>
                        <button class="chip" data-query="What PG programs are available?">🎓 PG Programs</button>
                        <button class="chip" data-query="Tell me about the MBA department">📊 MBA</button>
                        <button class="chip" data-query="What are the hostel facilities?">🏠 Hostel</button>
                    </div>
                `;
                
                const newChips = document.getElementById('suggestion-chips');
                if (newChips && typeof handleSendMessage === 'function') {
                    newChips.addEventListener('click', (e) => {
                        const chip = e.target.closest('.chip');
                        if (chip) handleSendMessage(chip.getAttribute('data-query'));
                    });
                }
            }
        };
    </script>
</body>
</html>
